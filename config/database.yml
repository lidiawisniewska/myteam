# PostgreSQL is used in every environment.
#
# Local connection details come from the standard libpq environment variables
# (PGHOST, PGUSER, PGPASSWORD, PGPORT). With a default local Postgres install
# (e.g. Homebrew) the defaults usually just work. Override via those env vars
# if your local Postgres needs an explicit user/password.
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("PGHOST", "localhost") %>
  username: <%= ENV.fetch("PGUSER", ENV["USER"]) %>
  password: <%= ENV["PGPASSWORD"] %>

development:
  <<: *default
  database: myteam_development

# The test database is wiped and rebuilt between test runs — keep it separate.
test:
  <<: *default
  database: myteam_test

# Production uses the DATABASE_URL provided by the Railway Postgres add-on,
# which supplies host, credentials, and database name in one value.
production:
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV["DATABASE_URL"] %>
